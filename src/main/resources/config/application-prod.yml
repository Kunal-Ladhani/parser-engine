spring:
  devtools:
    add-properties: false
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${{ env.MYSQL_URL }}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: password
    name: property_db
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: mysql
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  docker:
    compose:
      file: docker-compose.yml
      enabled: true

aws:
  s3:
    arn: ${{ env.AWS_S3_ARN }}
    bucket_name: ${{ env.S3_BUCKET_NAME }}
    access_key: ${{ env.ACCESS_KEY }}
    secret_key: ${{ env.SECRET_KEY }}

# JWT Configuration
app:
  jwt:
    secret: "dGhpc2lzYXZlcnlsb25nYW5kc2VjdXJlc2VjcmV0a2V5Zm9yand0dG9rZW5zaWduaW5ndGhhdGlzMzJieXRlc2xvbmc="
    expiration-seconds: 900 # 15 minutes (short-lived access token)
    token-prefix: "Bearer "
    header-string: "Authorization"
    enable-token-blacklist: false
    refresh-token-expiration-seconds: 259200 # 3 days