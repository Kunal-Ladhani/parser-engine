server:
  port: 8080
  servlet:
    contextPath: /parser-engine
    application-display-name: parser-engine
    encoding:
      charset: UTF-8
  max-http-request-header-size: 10MB

spring:
  application:
    name: parser-engine
  profiles:
    active: dev
  mvc:
    dispatch-options-request: true
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
    format:
      date: dd/MM/yyyy
      date-time: yyyy-MM-dd HH:mm:ss
      time: HH:mm:ss
  jackson:
    time-zone: Asia/Kolkata
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ
    deserialization:
      adjust-dates-to-context-time-zone: false
    serialization:
      write-dates-as-timestamps: false
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    sql: info
    web: info
    root: info
    org:
      springframework:
        ws:
          client:
            MessageTracing:
              sent: INFO
              received: TRACE
          server:
            MessageTracing:
              sent: INFO
              received: TRACE
    software:
      amazon:
        awssdk: DEBUG
