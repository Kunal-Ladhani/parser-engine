spring:
  devtools:
    add-properties: false
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/property_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: mysql
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
    log-request-details: true
  docker:
    compose:
      file: docker-compose.yml
      enabled: false

aws:
  s3:
    region: ap-south-1
    bucket_name: parser-engine-bucket
    access_key: test
    secret_key: test

# JWT Configuration
app:
  jwt:
    secret: "dGhpc2lzYXZlcnlsb25nYW5kc2VjdXJlc2VjcmV0a2V5Zm9yand0dG9rZW5zaWduaW5ndGhhdGlzMzJieXRlc2xvbmc="
    expiration-seconds: 900 # 15 minutes (short-lived access token)
    token-prefix: "Bearer "
    header-string: "Authorization"
    enable-token-blacklist: false
    refresh-token-expiration-seconds: 259200 # 3 days
