server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306
    driver-class-name: com.mysql.cj.jdbc.Driver
    name: property_db
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    #    properties:
    #      hibernate:
    #        format_sql: true
  sql:
    init:
      mode: always
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher