server:
  port: 8081
  servlet:
    contextPath: /parser-engine
  max-http-request-header-size: 10MB

spring:
  devtools:
    add-properties: false
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/property_db
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: mysql
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

logging:
  level:
    sql: info
    web: info
    root: info
    org:
      springframework:
        ws:
          client:
            MessageTracing:
              sent: INFO
              received: TRACE
          server:
            MessageTracing:
              sent: INFO
              received: TRACE

aws:
  s3:
    arn: ${{ env.AWS_S3_ARN }}
    bucket_name: ${{ env.S3_BUCKET_NAME }}
    access_key: ${{ env.ACCESS_KEY }}
    secret_key: ${{ env.SECRET_KEY }}

